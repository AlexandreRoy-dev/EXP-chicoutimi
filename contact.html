<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | René Bouchard — EXP Chicoutimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:{blue:'#142838',dark:'#142838',light:'#f8fafc'}},fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/site.css">
</head>
<body class="antialiased font-sans relative">
<div class="cursor-dot"></div><div class="cursor-outline"></div>
<div id="site-nav"></div>
<div id="page-hero"></div>

<main class="py-16 px-6 md:px-12 bg-brand-light">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-16">
        <div class="w-full lg:w-5/12 gs-reveal">
            <p class="text-brand-blue uppercase tracking-widest text-sm mb-4">Je m'efforce de dépasser les attentes</p>
            <p class="text-zinc-400 text-lg font-light mb-10">Je suis disponible pour toutes vos demandes en immobilier au Saguenay. Je vous contacterai le plus rapidement possible.</p>
            <div class="space-y-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full border border-slate-200 flex items-center justify-center text-brand-blue"><i data-lucide="map-pin" class="w-5 h-5"></i></div>
                    <div>
                        <p class="text-xs uppercase tracking-widest text-zinc-500">Bureau</p>
                        <p class="text-lg font-serif">Saguenay (Chicoutimi), QC</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full border border-slate-200 flex items-center justify-center text-brand-blue"><i data-lucide="phone" class="w-5 h-5"></i></div>
                    <div>
                        <p class="text-xs uppercase tracking-widest text-zinc-500">Téléphone</p>
                        <a href="tel:+14185808958" class="text-xl font-serif hover:text-brand-blue transition">418-580-8958</a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full border border-slate-200 flex items-center justify-center text-brand-blue"><i data-lucide="mail" class="w-5 h-5"></i></div>
                    <div>
                        <p class="text-xs uppercase tracking-widest text-zinc-500">Courriel</p>
                        <a href="mailto:rene.bouchard@exprealty.com" class="text-xl font-serif hover:text-brand-blue transition">rene.bouchard@exprealty.com</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="w-full lg:w-7/12 gs-reveal">
            <form action="https://formspree.io/f/mnjknwdz" method="POST" class="bg-white p-10 rounded-3xl border border-slate-200">
                <input type="hidden" name="_subject" value="Contact — EXP Chicoutimi">
                <input type="hidden" name="form_source" value="Page contact">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div><label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Prénom</label><input type="text" name="prenom" required class="w-full bg-transparent border-b border-slate-300 pb-3 text-brand-dark focus:outline-none focus:border-brand-blue transition"></div>
                    <div><label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Nom</label><input type="text" name="nom" required class="w-full bg-transparent border-b border-slate-300 pb-3 text-brand-dark focus:outline-none focus:border-brand-blue transition"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div><label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Courriel</label><input type="email" name="email" required class="w-full bg-transparent border-b border-slate-300 pb-3 text-brand-dark focus:outline-none focus:border-brand-blue transition"></div>
                    <div><label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Téléphone</label><input type="tel" name="phone" class="w-full bg-transparent border-b border-slate-300 pb-3 text-brand-dark focus:outline-none focus:border-brand-blue transition"></div>
                </div>
                <div class="mb-6"><label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Message</label><textarea name="message" rows="5" class="w-full bg-transparent border-b border-slate-300 pb-3 text-brand-dark focus:outline-none focus:border-brand-blue transition resize-none"></textarea></div>
                <label class="flex items-start gap-3 text-xs text-zinc-500 mb-8 cursor-pointer">
                    <input type="checkbox" name="consent" required class="mt-1 accent-brand-blue">
                    <span>J'accepte d'être contacté par René Bouchard par appel, courriel et SMS. <a href="politique-confidentialite.html" class="text-brand-blue hover:underline">Politique de confidentialité</a>.</span>
                </label>
                <button type="submit" class="hover-trigger w-full bg-brand-blue text-white py-4 rounded-xl text-sm uppercase tracking-wider font-semibold hover:bg-brand-dark transition">Envoyer</button>
            </form>
        </div>
    </div>
</main>

<div id="site-footer"></div>
<script src="js/nav.js"></script><script src="js/site.js"></script>
<script>
renderSiteNav('contact.html');
renderPageHero('Contactez-moi', 'Une question sur l\'achat, la vente ou une propriété? Écrivez-moi.', [{label:'Accueil',href:'index.html'},{label:'Contact'}]);
renderSiteFooter();
</script>
</body>
</html>
